name: Build & Release EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build EXE
        run: uv run pyinstaller pyracing-coach.spec

      - name: Sign EXE (self-signed)
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigning `
            -Subject "CN=pyracing-coach" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -HashAlgorithm SHA256
          $timestamp = "http://timestamp.digicert.com"
          Set-AuthenticodeSignature `
            -FilePath dist\pyracing-coach.exe `
            -Certificate $cert `
            -TimestampServer $timestamp | Out-Null

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pyracing-coach.exe
          generate_release_notes: true
